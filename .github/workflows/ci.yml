name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Node 22 (current LTS, matches local dev); deps require >=20.x
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: xvfb-run -a npm test

  python-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}   # login shell so the micromamba env stays active
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Provision the spot env (conda-forge)
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: pick-ltl
          create-args: >-
            python=3.12
            spot
            pytest
            hypothesis
          condarc: |
            channels:
              - conda-forge

      - name: Install Python backend deps
        run: pip install -r python/requirements.txt

      - name: Preflight (spot + flask + antlr4 import)
        run: PYTHONPATH=python python python/preflight.py

      - name: Run backend tests
        run: python -m pytest python/tests -q
